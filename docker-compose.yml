services:
  # ── Rust backend ──────────────────────────────────────────────
  server:
    build:
      context: .
      dockerfile: corpus-server/Dockerfile
    container_name: corpus-server
    restart: unless-stopped
    # Port NOT published — backend only reachable via Docker internal network
    volumes:
      - corpus-data:/app/corpus-data
    environment:
      - RUST_LOG=info
      - CORPUS_PASSWORD=${CORPUS_PASSWORD:-natalieportman}
      - CORPUS_SESSION_TTL=${CORPUS_SESSION_TTL:-86400}

  # ── React frontend (nginx) ───────────────────────────────────
  ui:
    build:
      context: corpus-ui
      dockerfile: Dockerfile
    container_name: corpus-ui
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - server

volumes:
  corpus-data:
